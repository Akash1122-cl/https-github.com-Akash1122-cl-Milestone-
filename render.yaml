services:
  # FastAPI Backend Service
  - type: web
    name: mutual-fund-api
    runtime: python
    plan: free
    repo: https://github.com/Akash1122-cl/Milestone-
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CHROMA_API_KEY
        sync: false
      - key: CHROMA_TENANT
        sync: false
      - key: CHROMA_DATABASE
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.10"
        sync: false

  # Next.js Frontend Service
  - type: web
    name: mutual-fund-web
    runtime: node
    plan: free
    repo: https://github.com/Akash1122-cl/Milestone-
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: mutual-fund-api
          property: host
      - key: NODE_VERSION
        value: "20"
        sync: false
